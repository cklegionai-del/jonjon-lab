services:
  chromadb:
    image: chromadb/chroma:latest
    ports:
      - "8000:8000"
    volumes:
      - ./chroma_db:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
    networks:
      - ai-net

  open-webui:
    image: ghcr.io/open-webui/open-webui:0.9.0
    ports:
      - "3009:8080"
    volumes:
      - open-webui-data:/app/backend/data
    environment:
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - VECTOR_DB=chroma
      - CHROMA_HTTP_HOST=chromadb
      - CHROMA_HTTP_PORT=8000
      - HF_TOKEN=skip
      - HF_HUB_OFFLINE=1
      - HF_HUB_DISABLE_TELEMETRY=1
    depends_on:
      - chromadb
    networks:
      - ai-net

  searxng:
    image: searxng/searxng:latest
    ports:
      - "8080:8080"
    networks:
      - ai-net

volumes:
  open-webui-data:

networks:
  ai-net:
    driver: bridge
