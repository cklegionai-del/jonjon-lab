<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم المندوب - تونس 1</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Tajawal', sans-serif;
        }
        
        body, html {
            height: 100%;
            background-color: #f5f5f5;
        }

        .header {
            background-color: #006633;
            color: white;
            padding: 20px;
            text-align: center;
            font-size: 1.5rem;
        }
        
        .logout-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background-color: #ef4444;
            color: white;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            font-size: 1rem;
        }
        
        .quick-stats {
            display: flex;
            justify-content: space-around;
            margin-top: 30px;
        }

        .card {
            background-color: white;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            padding: 20px;
            width: calc(25% - 30px);
        }

        .card h2 {
            font-size: 1rem;
            margin-bottom: 10px;
        }
        
        .card p {
            font-size: 1.5rem;
            color: #006633;
        }

        .table-container {
            width: 90%;
            margin: auto;
            margin-top: 40px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th, td {
            padding: 15px;
            text-align: center;
            border-bottom: 1px solid #ddd;
        }
        
        th {
            background-color: #006633;
            color: white;
        }

    </style>
</head>
<body>
    <div class="header">
        لوحة تحكم المندوب - تونس 1
        <span id="date"></span>
        <button class="logout-btn" onclick="handleLogout()">تسجيل الخروج</button>
    </div>

    <div class="quick-stats">
        <div class="card" id="schools-reported-card">
            <h2>مدارس رسلت تقرير اليوم</h2>
            <p id="reported-schools-count">0</p>
        </div>
        
        <div class="card" id="schools-not-reported-card">
            <h2>مدارس لم ترسل بعد</h2>
            <p id="not-reported-schools-count">0</p>
        </div>

        <div class="card" id="teachers-absent-card">
            <h2>إجمالي الأساتذة الغائبين اليوم</h2>
            <p id="total-teachers-absent">0</p>
        </div>

        <div class="card" id="students-absent-card">
            <h2>إجمالي التلاميذ الغائبين اليوم</h2>
            <p id="total-students-absent">0</p>
        </div>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>اسم المدرسة</th>
                    <th>النوع</th>
                    <th>المدير</th>
                </tr>
            </thead>
            <tbody id="missing-reports-table-body"></tbody>
        </table>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const token = localStorage.getItem('access_token');
            if (!token) {
                window.location.href = '/login.html';
                return;
            }

            fetchDailyReports();
            fetchMissingReports();

            // Update date
            const today = new Date().toLocaleDateString("ar-EG");
            document.getElementById('date').textContent = `التاريخ: ${today}`;
        });

        function handleLogout() {
            localStorage.removeItem('access_token');
            window.location.href = '/login.html';
        }

        async function fetchDailyReports() {
            try {
                const response = await fetch('http://localhost:8001/api/daily-reports/', {
                    headers: { 'Authorization': `Bearer ${localStorage.getItem('access_token')}` }
                });

                if (!response.ok) throw new Error(await response.text());

                const reports = await response.json();
                
                // Update quick stats
                document.getElementById('reported-schools-count').textContent = reports.length;
            } catch (error) {
                console.error(error);
            }
        }

        async function fetchMissingReports() {
            try {
                const response = await fetch('http://localhost:8001/api/daily-reports/missing-today', {
                    headers: { 'Authorization': `Bearer ${localStorage.getItem('access_token')}` }
                });

                if (!response.ok) throw new Error(await response.text());

                const missingReports = await response.json();
                
                // Update quick stats
                document.getElementById('not-reported-schools-count').textContent = missingReports.length;

                // Populate table body
                const tbody = document.getElementById('missing-reports-table-body');
                tbody.innerHTML = '';
                missingReports.forEach(report => {
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td>${report.name}</td>
                        <td>...</td>
                        <td>...</td>
                    `;
                    tbody.appendChild(row);
                });
            } catch (error) {
                console.error(error);
            }
        }
    </script>
</body>
</html>
