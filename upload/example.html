<!DOCTYPE html>
<html>
<head>
    <title>Hero Example</title>
    <style>
        .hero {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 100px 20px;
            text-align: center;
        }
        .cards {
            display: flex;
            gap: 20px;
            padding: 50px;
        }
        .card {
            background: #f0f0f0;
            padding: 20px;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <header class="hero">
        <h1>Welcome to Our Platform</h1>
        <p>Best services for your business</p>
        <button>Get Started</button>
    </header>
    <div class="cards">
        <div class="card">
            <h3>Service 1</h3>
            <p>Description here</p>
        </div>
        <div class="card">
            <h3>Service 2</h3>
            <p>Description here</p>
        </div>
    </div>
</body>
</html>
