<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>اختبار Three.js</title>
    <style>
        body { margin: 0; overflow: hidden; }
        .info {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            color: #0f0;
            padding: 10px;
            border-radius: 5px;
            font-family: monospace;
            z-index: 100;
        }
    </style>
</head>
<body>
    <div class="info">
        ✅ Three.js يعمل | 🟦 مكعب دوار
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // المشهد
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a2a);
        scene.fog = new THREE.FogExp2(0x0a0a2a, 0.008);

        // الكاميرا
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(2, 2, 5);
        camera.lookAt(0, 0, 0);

        // المعالج
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // الإضاءة (ثلاثية الأبعاد واقعية)
        const ambientLight = new THREE.AmbientLight(0x404060, 0.6);
        scene.add(ambientLight);
        
        const mainLight = new THREE.DirectionalLight(0xffffff, 1.2);
        mainLight.position.set(3, 5, 2);
        mainLight.castShadow = true;
        scene.add(mainLight);
        
        const fillLight = new THREE.PointLight(0x4466cc, 0.5);
        fillLight.position.set(-2, 1, 3);
        scene.add(fillLight);
        
        const rimLight = new THREE.PointLight(0xffaa66, 0.4);
        rimLight.position.set(0, 1, -3);
        scene.add(rimLight);

        // أرضية شبكية
        const gridHelper = new THREE.GridHelper(10, 20, 0x88aaff, 0x335588);
        gridHelper.position.y = -1.2;
        scene.add(gridHelper);

        // مكعب (بديل النموذج)
        const geometry = new THREE.BoxGeometry(1.5, 1.5, 1.5);
        const material = new THREE.MeshStandardMaterial({ 
            color: 0x3a86ff,
            metalness: 0.7,
            roughness: 0.3,
            emissive: 0x001133,
            emissiveIntensity: 0.2
        });
        const cube = new THREE.Mesh(geometry, material);
        cube.castShadow = true;
        cube.receiveShadow = true;
        scene.add(cube);

        // كرة صغيرة تتحرك حول المكعب (تأثير جمالي)
        const sphereGeo = new THREE.SphereGeometry(0.15, 16, 16);
        const sphereMat = new THREE.MeshStandardMaterial({ color: 0xffaa44, emissive: 0x442200, emissiveIntensity: 0.5 });
        const sphere = new THREE.Mesh(sphereGeo, sphereMat);
        sphere.castShadow = true;
        scene.add(sphere);

        // OrbitControls مع دوران تلقائي
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 2.0;
        controls.enableZoom = true;
        controls.enablePan = true;
        controls.target.set(0, 0, 0);

        // متغيرات للحركة
        let time = 0;

        // حلقة الرسم
        function animate() {
            requestAnimationFrame(animate);
            time += 0.02;
            
            // تدوير المكعب
            cube.rotation.x = Math.sin(time * 0.5) * 0.3;
            cube.rotation.y = time * 0.8;
            cube.rotation.z = Math.sin(time * 0.3) * 0.2;
            
            // تحريك الكرة حول المكعب
            const radius = 1.8;
            sphere.position.x = Math.cos(time) * radius;
            sphere.position.z = Math.sin(time) * radius;
            sphere.position.y = Math.sin(time * 2) * 0.5;
            
            controls.update();
            renderer.render(scene, camera);
        }
        
        animate();

        // معالجة تغيير حجم النافذة
        window.addEventListener('resize', onWindowResize);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
        
        console.log('✅ Three.js يعمل بشكل كامل');
    </script>
</body>
</html><!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <title>اختبار النموذج 3D</title>
    <style>
        body { margin: 0; overflow: hidden; }
        .info {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 10px;
            border-radius: 5px;
            font-family: Arial;
            z-index: 100;
        }
    </style>
</head>
<body>
    <div class="info">
        🧪 جاري تحميل النموذج... <span id="status">0%</span>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // المشهد
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a2e);
        scene.fog = new THREE.FogExp2(0x1a1a2e, 0.02);

        // الكاميرا
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(2, 2, 5);
        camera.lookAt(0, 0, 0);

        // المعالج
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // الإضاءة
        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);
        
        const mainLight = new THREE.DirectionalLight(0xffffff, 1);
        mainLight.position.set(3, 5, 2);
        mainLight.castShadow = true;
        scene.add(mainLight);
        
        const fillLight = new THREE.PointLight(0x4466cc, 0.5);
        fillLight.position.set(-2, 1, 3);
        scene.add(fillLight);
        
        const backLight = new THREE.PointLight(0xffaa66, 0.3);
        backLight.position.set(0, 1, -3);
        scene.add(backLight);

        // شبكة مساعدة
        const gridHelper = new THREE.GridHelper(8, 20, 0x888888, 0x444444);
        scene.add(gridHelper);

        // OrbitControls
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 1.5;
        controls.enableZoom = true;
        controls.enablePan = true;

        // تحميل النموذج
        const loader = new GLTFLoader();
        const modelPath = '/models/product.glb';
        const statusDiv = document.getElementById('status');
        
        console.log('جاري تحميل النموذج من:', modelPath);
        statusDiv.textContent = 'جارٍ التحميل...';
        
        loader.load(modelPath, 
            (gltf) => {
                const model = gltf.scene;
                model.traverse((child) => {
                    if (child.isMesh) {
                        child.castShadow = true;
                        child.receiveShadow = true;
                    }
                });
                scene.add(model);
                console.log('✅ تم تحميل النموذج بنجاح');
                statusDiv.textContent = 'تم التحميل ✅';
                controls.autoRotate = true;
            },
            (progress) => {
                const percent = Math.round((progress.loaded / progress.total) * 100);
                statusDiv.textContent = `${percent}%`;
                console.log(`تحميل: ${percent}%`);
            },
            (error) => {
                console.error('❌ خطأ في تحميل النموذج:', error);
                statusDiv.textContent = 'خطأ في التحميل ❌';
            }
        );

        // إحصائيات بسيطة
        const stats = {
            fps: 0,
            frameCount: 0,
            lastTime: performance.now()
        };

        // الحلقة الرئيسية
        function animate() {
            const now = performance.now();
            stats.frameCount++;
            if (now - stats.lastTime >= 1000) {
                stats.fps = stats.frameCount;
                stats.frameCount = 0;
                stats.lastTime = now;
            }
            
            controls.update();
            renderer.render(scene, camera);
            requestAnimationFrame(animate);
        }
        
        animate();

        // معالجة تغيير حجم النافذة
        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
        
        console.log('🚀 التطبيق جاهز');
    </script>
</body>
</html><!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>عرض نموذج 3D من GLTF</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      direction: rtl;
    }
    canvas {
      display: block;
    }
  </style>
</head>
<body>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/controls/OrbitControls.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/loaders/GLTFLoader.min.js"></script>
  <script>
    // إنشاء المشهد
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1a1a2e);

    // إنشاء الكاميرا
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 1, 5);

    // إنشاء Renderer
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);

    // إضافة إضاءة
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
    scene.add(ambientLight);

    const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
    directionalLight.position.set(5, 5, 5);
    directionalLight.castShadow = true;
    directionalLight.shadow.mapSize.width = 1024;
    directionalLight.shadow.mapSize.height = 1024;
    scene.add(directionalLight);

    // إضافة ضوء إضافي من الأسفل
    const backLight = new THREE.DirectionalLight(0x4444ff, 0.5);
    backLight.position.set(-5, -3, -5);
    scene.add(backLight);

    // إضافة Grid Helper
    const gridHelper = new THREE.GridHelper(10, 10, 0x444444, 0x222222);
    scene.add(gridHelper);

    // إضافة Axis Helper
    const axesHelper = new THREE.AxesHelper(5);
    scene.add(axesHelper);

    // إضافة OrbitControls
    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.screenSpacePanning = false;
    controls.minDistance = 1;
    controls.maxDistance = 10;

    // تحميل النموذج GLTF
    const loader = new THREE.GLTFLoader();
    const modelPath = 'models/product.glb'; // تأكد من وجود المجلد والملف

    loader.load(
      modelPath,
      (gltf) => {
        const model = gltf.scene;
        
        // مركز النموذج في المشهد
        const box = new THREE.Box3().setFromObject(model);
        const center = box.getCenter(new THREE.Vector3());
        model.position.x += (model.position.x - center.x);
        model.position.y += (model.position.y - center.y);
        model.position.z += (model.position.z - center.z);
        
        // تمركز النموذج
        model.position.y = 0;
        
        // تحسين حجم النموذج إذا لزم الأمر
        const scale = 1.0;
        model.scale.set(scale, scale, scale);
        
        // إضافة النموذج للمشهد
        scene.add(model);
        
        console.log('تم تحميل النموذج بنجاح');
      },
      (progress) => {
        console.log('تحميل النموذج: ' + Math.round(progress.loaded / progress.total * 100) + '%');
      },
      (error) => {
        console.error('حدث خطأ أثناء تحميل النموذج:', error);
        // إظهار رسالة خطأ بسيطة إذا لم يتم تحميل النموذج
        const errorText = new THREE.TextGeometry('Model Load Error', { 
          font: new THREE.Font(), 
          size: 0.5, 
          height: 0.1 
        });
        console.log('خطأ في تحميل النموذج. تأكد من وجود ملف product.glb في مجلد models/');
      }
    );

    // دورة الرسم
    function animate() {
      requestAnimationFrame(animate);
      
      // تحديث controls
      controls.update();
      
      renderer.render(scene, camera);
    }

    // تشغيل الدورة
    animate();

    // إعادة ضبط الحجم عند تغيير حجم النافذة
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // إضافة معلومات حول تحميل النموذج
    console.log('جاري تحميل النموذج من models/product.glb...');
    console.log('تأكد من وجود مجلد "models" يحتوي على ملف "product.glb" في نفس المجلد');
  </script>
</body>
</html>
