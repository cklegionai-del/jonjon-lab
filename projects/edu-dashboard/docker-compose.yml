version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: edu-postgres
    environment:
      POSTGRES_DB: edu_db
      POSTGRES_USER: edu_user
      POSTGRES_PASSWORD: edu_pass
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - edu-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: edu-backend
    ports:
      - "8002:8001"
    depends_on:
      - postgres
    networks:
      - edu-network

  nginx:
    image: nginx:latest
    container_name: edu-frontend
    ports:
      - "8093:80"
    volumes:
      - ./frontend:/usr/share/nginx/html
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - backend
    networks:
      - edu-network

volumes:
  postgres_data:

networks:
  edu-network:
    driver: bridge
