use_default_settings: true
server:
  secret_key: "$SEARXNG_SECRET"
  limiter: false
  image_proxy: false
  port: 8080
  bind_address: "0.0.0.0"
  method: "GET"
search:
  safe_search: 0
  formats:
    - html
    - json
outgoing:
  request_timeout: 10.0
  proxies:
    all://:
      - socks5h://tor-proxy:9050
